<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Paper background -->
  <rect width="1200" height="630" fill="#F2EFE7"/>

  <!-- Top hairline header rules -->
  <line x1="80" y1="80" x2="1120" y2="80" stroke="#161814" stroke-width="0.75" opacity="0.9"/>

  <!-- Header meta -->
  <text x="80" y="68" font-family="'Inter Tight', Arial, Helvetica, sans-serif" font-size="12" letter-spacing="3" fill="#161814" opacity="0.55">EST. MMXXVI</text>
  <text x="600" y="68" text-anchor="middle" font-family="'Fraunces', Georgia, serif" font-style="italic" font-size="13" fill="#161814" opacity="0.55">Real Property · Northeast</text>
  <text x="1120" y="68" text-anchor="end" font-family="'Inter Tight', Arial, Helvetica, sans-serif" font-size="12" letter-spacing="3" fill="#161814" opacity="0.55">CONFIDENTIAL</text>

  <!-- Primary wordmark -->
  <g transform="translate(600 310)">
    <text text-anchor="middle" font-family="'Fraunces', Georgia, 'Times New Roman', serif" font-size="108" font-weight="400" letter-spacing="14" fill="#161814">
      <tspan dx="-220">THANE</tspan>
      <tspan dx="20" font-style="italic" fill="#836634">&amp;</tspan>
      <tspan dx="20">REEVE</tspan>
    </text>
    <!-- Brass seal underline beneath the ampersand -->
    <line x1="-20" y1="24" x2="20" y2="24" stroke="#836634" stroke-width="3"/>
  </g>

  <!-- Tagline -->
  <text x="600" y="410" text-anchor="middle" font-family="'Fraunces', Georgia, serif" font-style="italic" font-size="28" fill="#161814" opacity="0.82">Land held. Land managed.</text>

  <!-- Divider dot -->
  <circle cx="600" cy="460" r="3" fill="#836634"/>

  <!-- Footer hairline -->
  <line x1="80" y1="550" x2="1120" y2="550" stroke="#161814" stroke-width="0.5" opacity="0.4"/>

  <!-- Footer -->
  <text x="80" y="575" font-family="'Inter Tight', Arial, Helvetica, sans-serif" font-size="12" letter-spacing="3" fill="#161814" opacity="0.55">THANE &amp; REEVE HOLDINGS LLC</text>
  <text x="1120" y="575" text-anchor="end" font-family="'Inter Tight', Arial, Helvetica, sans-serif" font-size="12" letter-spacing="3" fill="#161814" opacity="0.55">THANEANDREEVE.COM</text>
</svg>
